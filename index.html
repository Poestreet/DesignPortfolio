<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon (R104 Opquast) ───────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Primary meta ───────────────────────────────────────────────── -->
    <title>Julien Bourcet, Designer</title>
    <meta name="description" content="Le pont entre la stratégie et la haute fidélité. Autodidacte depuis 1998. Design Systems, accessibilité, UX centré utilisateur. SNCF Connect, Rail Europe, L'Équipe." />
    <meta name="author" content="Julien Bourcet" />
    <link rel="canonical" href="https://www.julienbourcet.fr" />

    <!-- ── Open Graph ─────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.julienbourcet.fr" />
    <meta property="og:title" content="Julien Bourcet, Designer" />
    <meta property="og:description" content="Le pont entre la stratégie et la haute fidélité. Autodidacte depuis 1998. Design Systems, accessibilité, UX centré utilisateur. SNCF Connect, Rail Europe, L'Équipe." />
    <meta property="og:image" content="https://www.julienbourcet.fr/og-image.png" /><!-- TODO: ajouter une vraie og:image 1200×630px -->
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Julien Bourcet" />

    <!-- ── Twitter Card ───────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Julien Bourcet, Designer" />
    <meta name="twitter:description" content="Le pont entre la stratégie et la haute fidélité. Autodidacte depuis 1998. Design Systems, accessibilité, UX centré utilisateur. SNCF Connect, Rail Europe, L'Équipe." />
    <meta name="twitter:image" content="https://www.julienbourcet.fr/og-image.png" /><!-- TODO: même image que og:image -->

    <!-- ── Theme color (mobile browser chrome) ───────────────────────── -->
    <meta name="theme-color" content="#070071" />

    <!-- ── Fonts — <link> in head > CSS @import (non-blocking, earlier) ─ -->
    <!-- Weights actually used: Outfit 400/500/800 · Fraunces italic 700  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,300;1,9..144,700&family=Outfit:wght@400;500;800&display=swap" />

    <!-- ── Structured data: Person ────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Julien Bourcet",
      "jobTitle": "Product Designer",
      "url": "https://www.julienbourcet.fr",
      "description": "Le pont entre la stratégie et la haute fidélité. Autodidacte, passionné par les arts graphiques depuis 1998. Spécialisé en design produit : Design Systems, accessibilité (Opquast), UX centré utilisateur. Vision 360° couvrant le B2B, B2C, B2G, SaaS, tourisme, mobilité et e-commerce.",
      "knowsAbout": [
        "UX Design", "UI Design", "Design Systems", "DesignOps",
        "Product Design", "Accessibility", "Front-End Development", "UX Research"
      ]
    }
    </script>

    <!-- ── Structured data: WebSite ───────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Julien Bourcet, Designer",
      "url": "https://www.julienbourcet.fr",
      "description": "Portfolio of Julien Bourcet, product designer specialized in UX/UI, design systems, accessibility and front-end development.",
      "author": {
        "@type": "Person",
        "name": "Julien Bourcet"
      }
    }
    </script>

    <!-- ── Structured data: ProfilePage (rich results eligible) ─────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfilePage",
      "dateCreated": "2025-01-01",
      "dateModified": "2026-04-21",
      "url": "https://www.julienbourcet.fr/about",
      "name": "À propos — Julien Bourcet, Designer",
      "description": "Le pont entre la stratégie et la haute fidélité. Product designer autodidacte depuis 1998, spécialisé en Design Systems, accessibilité et UX centré utilisateur.",
      "mainEntity": {
        "@type": "Person",
        "name": "Julien Bourcet",
        "jobTitle": "Product Designer",
        "url": "https://www.julienbourcet.fr",
        "description": "Le pont entre la stratégie et la haute fidélité. Autodidacte depuis 1998. Design Systems, accessibilité, UX centré utilisateur. SNCF Connect, Rail Europe, L'Équipe.",
        "knowsAbout": [
          "UX Design", "UI Design", "Design Systems", "DesignOps",
          "Product Design", "Accessibility", "Front-End Development", "UX Research"
        ],
        "hasOccupation": {
          "@type": "Occupation",
          "name": "Product Designer",
          "occupationLocation": { "@type": "Country", "name": "France" },
          "skills": "UX Design, UI Design, Design Systems, Accessibilité, Figma, React, TypeScript"
        }
      }
    }
    </script>

    <!-- ── Structured data: Portfolio cases (GEO) ─────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "name": "Portfolio — Julien Bourcet, Designer",
      "description": "Sélection de cas clients de Julien Bourcet, product designer spécialisé en UX/UI et Design Systems.",
      "url": "https://www.julienbourcet.fr/cases",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "item": {
            "@type": "CreativeWork",
            "name": "SNCF Connect — Refonte du tunnel d'achat",
            "description": "Refonte du panier et du tunnel de commande pour SNCF Connect, l'application de mobilité leader en France. Mission en tant que Senior Product Designer (2021–2023).",
            "url": "https://www.julienbourcet.fr/cases",
            "creator": { "@type": "Person", "name": "Julien Bourcet" },
            "dateCreated": "2023",
            "about": ["UX Design", "Product Design", "Mobilité", "B2C"]
          }
        },
        {
          "@type": "ListItem",
          "position": 2,
          "item": {
            "@type": "CreativeWork",
            "name": "Manutan — Refonte du moteur de recherche",
            "description": "Refonte du funnel de recherche produit pour Manutan, leader européen de la fourniture de bureau et d'équipement B2B.",
            "url": "https://www.julienbourcet.fr/cases",
            "creator": { "@type": "Person", "name": "Julien Bourcet" },
            "about": ["UX Design", "Product Design", "E-commerce", "B2B"]
          }
        }
      ]
    }
    </script>

    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100%; }
      /* Skip link — visually hidden until focused (WCAG 2.4.1) */
      .skip-link {
        position: absolute; top: -100%; left: 16px;
        padding: 8px 16px; background: #fafafa; color: #070071;
        font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 14px;
        text-decoration: none; z-index: 9999;
        border-radius: 0 0 4px 4px;
        transition: top 0.1s;
      }
      .skip-link:focus { top: 0; }
    </style>
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
