<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Julien Bourcet, Designer</title>
    <meta name="robots" content="noindex" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; background: #070071; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Outfit', sans-serif, system-ui;
        color: #fafafa;
        text-align: center;
        padding: 32px;
        gap: 24px;
      }
      .eyebrow {
        font-family: 'Fraunces', serif, Georgia;
        font-style: italic;
        font-weight: 700;
        font-size: 72px;
        line-height: 1;
        margin: 0;
        opacity: 0.3;
      }
      h1 {
        font-family: 'Fraunces', serif, Georgia;
        font-style: italic;
        font-weight: 700;
        font-size: 22px;
        margin: 0;
      }
      p { font-weight: 400; font-size: 14px; line-height: 1.7; margin: 0; opacity: 0.7; }
      nav { display: flex; flex-direction: column; gap: 16px; align-items: center; margin-top: 8px; }
      a {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: #fafafa;
        font-weight: 800;
        font-size: 11px;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      a::before {
        content: '';
        display: block;
        width: 32px;
        height: 1px;
        background: #fafafa;
        transition: width 0.3s ease;
      }
      a:hover::before { width: 48px; }
      a:focus-visible { outline: 2px solid #fafafa; outline-offset: 4px; border-radius: 2px; }
    </style>
  </head>
  <body>
    <p class="eyebrow" aria-hidden="true">404</p>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has been moved.</p>
    <nav aria-label="Return to site">
      <a href="/">Homepage</a>
      <a href="/cases">Cases</a>
      <a href="/about">About</a>
      <a href="/contact">Contact</a>
    </nav>
  </body>
</html>
